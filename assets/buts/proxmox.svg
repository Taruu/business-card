<svg xmlns="http://www.w3.org/2000/svg" width="88" height="31" viewBox="0 0 88 31">
    <!-- Definitions for gradients and reflections -->
    <defs>
        <!-- Glossy reflection gradient -->
        <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
            <stop offset="45%" stop-color="#ffffff" stop-opacity="0.08"/>
            <stop offset="50%" stop-color="#ffffff" stop-opacity="0.0"/>
        </linearGradient>

        <!-- Dark background gradient for left pane -->
        <linearGradient id="dark-bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1f232b"/>
            <stop offset="100%" stop-color="#121418"/>
        </linearGradient>

        <!-- Orange background gradient for right pane -->
        <linearGradient id="orange-bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ff7a00"/>
            <stop offset="100%" stop-color="#d45d00"/>
        </linearGradient>
    </defs>

    <!-- Left Pane (Dark Slate) -->
    <rect x="1" y="1" width="57" height="29" fill="url(#dark-bg)" />

    <!-- Right Pane (Proxmox Orange) -->
    <rect x="58" y="1" width="29" height="29" fill="url(#orange-bg)" />

    <!-- Inner Bevel Highlights & Shadows (3D Retro Effect) -->
    <!-- Left Pane Bevels -->
    <line x1="2" y1="2" x2="57" y2="2" stroke="#4f5666" stroke-width="1" />
    <line x1="2" y1="2" x2="2" y2="28" stroke="#4f5666" stroke-width="1" />
    <line x1="2" y1="28" x2="57" y2="28" stroke="#090a0c" stroke-width="1" />

    <!-- Right Pane Bevels -->
    <line x1="58" y1="2" x2="85" y2="2" stroke="#ffb266" stroke-width="1" />
    <line x1="85" y1="2" x2="85" y2="28" stroke="#7a3400" stroke-width="1" />
    <line x1="58" y1="28" x2="85" y2="28" stroke="#7a3400" stroke-width="1" />

    <!-- Vertical Divider (Split line shadow/highlight) -->
    <line x1="57" y1="2" x2="57" y2="28" stroke="#090a0c" stroke-width="1" />
    <line x1="58" y1="2" x2="58" y2="28" stroke="#ffb266" stroke-width="1" opacity="0.4" />

    <!-- Official Proxmox Chevron Icon -->
    <!-- Icon Drop Shadow -->
    <g transform="translate(6, 9.5) scale(0.58)" opacity="0.9">
        <path d="M 3,4 C 4,6 4.5,9 4.5,12 C 4.5,15 4,18 3,20 C 5,19 8,16 10,12 C 8,8 5,5 3,4 Z" fill="#050608" />
        <path d="M 21,4 C 20,6 19.5,9 19.5,12 C 19.5,15 20,18 21,20 C 19,19 16,16 14,12 C 16,8 19,5 21,4 Z" fill="#050608" />
        <path d="M 4,3 C 6,4 9,4.5 12,4.5 C 15,4.5 18,4 20,3 C 19,5 16,8 12,10 C 8,8 5,5 4,3 Z" fill="#050608" />
        <path d="M 4,21 C 6,20 9,19.5 12,19.5 C 15,19.5 18,20 20,21 C 19,19 16,16 12,14 C 8,16 5,19 4,21 Z" fill="#050608" />
    </g>
    <!-- Main Icon Graphic -->
    <g transform="translate(5, 8.5) scale(0.58)">
        <!-- Left & Right Orange Chevrons -->
        <path d="M 3,4 C 4,6 4.5,9 4.5,12 C 4.5,15 4,18 3,20 C 5,19 8,16 10,12 C 8,8 5,5 3,4 Z" fill="#ff7a00" />
        <path d="M 21,4 C 20,6 19.5,9 19.5,12 C 19.5,15 20,18 21,20 C 19,19 16,16 14,12 C 16,8 19,5 21,4 Z" fill="#ff7a00" />
        <!-- Top & Bottom White Chevrons (white for high-contrast on dark-bg) -->
        <path d="M 4,3 C 6,4 9,4.5 12,4.5 C 15,4.5 18,4 20,3 C 19,5 16,8 12,10 C 8,8 5,5 4,3 Z" fill="#ffffff" />
        <path d="M 4,21 C 6,20 9,19.5 12,19.5 C 15,19.5 18,20 20,21 C 19,19 16,16 12,14 C 8,16 5,19 4,21 Z" fill="#ffffff" />
    </g>

    <!-- "Proxmox" Text with Drop Shadow -->
    <!-- Shadow -->
    <text x="39" y="20" font-family="Verdana, Geneva, sans-serif" font-size="9" font-weight="bold" fill="#050608" opacity="0.85" text-anchor="middle">Proxmox</text>
    <!-- Main Text -->
    <text x="38" y="19" font-family="Verdana, Geneva, sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">Proxmox</text>

    <!-- "VE" Text with Drop Shadow -->
    <!-- Shadow -->
    <text x="73.5" y="20" font-family="Verdana, Geneva, sans-serif" font-size="11" font-weight="bold" fill="#4d2200" text-anchor="middle">VE</text>
    <!-- Main Text -->
    <text x="72.5" y="19" font-family="Verdana, Geneva, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">VE</text>

    <!-- Gloss Overlay -->
    <rect x="1" y="1" width="86" height="14" fill="url(#gloss)" pointer-events="none" />

    <!-- Outer Border -->
    <rect x="0.5" y="0.5" width="87" height="30" fill="none" stroke="#050608" stroke-width="1" />
</svg>