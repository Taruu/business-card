<svg xmlns="http://www.w3.org/2000/svg" width="88" height="31" viewBox="0 0 88 31">
    <!-- Definitions for gradients -->
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1c1c1e"/>
            <stop offset="100%" stop-color="#0c0c0e"/>
        </linearGradient>
        <linearGradient id="border-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#444448"/>
            <stop offset="100%" stop-color="#222224"/>
        </linearGradient>
    </defs>

    <!-- Button Background and Outer Border -->
    <rect x="0.5" y="0.5" width="87" height="30" rx="3" fill="url(#bg)" stroke="url(#border-grad)" stroke-width="1"/>

    <!-- High-Contrast Icon Circle (Dusty Terracotta Sky) -->
    <circle cx="16" cy="15.5" r="11" fill="#b48c7d" stroke="#2a2a2c" stroke-width="0.75"/>

    <!-- Simplified Beret (Hat Only) -->
    <!-- 1. Beret Stem -->
    <path d="M 15.5,13.5 L 15,10" stroke="#111113" stroke-width="1.5" stroke-linecap="round"/>

    <!-- 2. Main Beret Body -->
    <path d="M 7,18 C 7,13 23,11 25,16 C 25.5,18 20,21.5 12,21 C 9,20.8 7,19.5 7,18 Z" fill="#111113"/>

    <!-- 3. Fold Highlight/Shadow Line -->
    <path d="M 8.5,18.5 C 10.5,20 18.5,20 23.5,16.5" stroke="#313136" stroke-width="1" fill="none"/>

    <!-- Subtle Vertical Divider -->
    <line x1="31" y1="6" x2="31" y2="25" stroke="#252528" stroke-width="1"/>

    <!-- Typography -->
    <!-- RomkaZVO Text -->
    <text x="36" y="14.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff" letter-spacing="0.2">RomkaZVO</text>

    <!-- Radio DJ Subtext -->
    <text x="36" y="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="6" font-weight="700" fill="#a1a1a6" letter-spacing="0.5">RADIO DJ</text>

    <!-- On-Air Status Indicator -->
    <circle cx="79" cy="21.2" r="2" fill="#ff453a" opacity="0.35"/>
    <circle cx="79" cy="21.2" r="1" fill="#ff453a"/>
</svg>