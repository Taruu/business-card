<svg width="88" height="31" viewBox="0 0 88 31" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Background Gradients -->
        <linearGradient id="left-bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#181436" />
            <stop offset="100%" stop-color="#09071c" />
        </linearGradient>
        <linearGradient id="right-bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0b0e14" />
            <stop offset="100%" stop-color="#161b22" />
        </linearGradient>
    </defs>

    <!-- Outer Border & Base -->
    <rect width="88" height="31" rx="2" fill="#0d1117" />

    <!-- Left Section (Orange Fruit Canvas) -->
    <rect x="1" y="1" width="26" height="29" fill="url(#left-bg)" />

    <!-- Right Section (Text Canvas) -->
    <rect x="27" y="1" width="60" height="29" fill="url(#right-bg)" />

    <!-- Orange Side Accent -->
    <rect x="1" y="1" width="2" height="6" fill="#ff9d00" />

    <!-- Vector Orange (Fruit) -->
    <g id="orange-fruit">
        <!-- Stem -->
        <path d="M14 11 Q15 7 18 6" stroke="#6d4c41" stroke-width="1" stroke-linecap="round" fill="none" />
        <!-- Leaf -->
        <path d="M15 8 C17 6 21 6 19 9 C17 11 15 10 15 8 Z" fill="#388e3c" stroke="#1b5e20" stroke-width="0.5" />
        <!-- Orange Body -->
        <circle cx="14" cy="18" r="7" fill="#ff9100" />
        <!-- Orange Shading/Shadow -->
        <path d="M8 21 A 7 7 0 0 0 20 19" fill="none" stroke="#e65100" stroke-width="1" opacity="0.6" stroke-linecap="round" />
        <!-- Orange Highlight -->
        <circle cx="11.5" cy="15.5" r="1.5" fill="#ffcc80" opacity="0.8" />
    </g>

    <!-- Divider Line -->
    <line x1="27" y1="1" x2="27" y2="30" stroke="#1f242c" />

    <!-- Text Section -->
    <!-- "bropines" -->
    <text x="58" y="13.5"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="8.5"
          font-weight="bold"
          fill="#ffffff"
          text-anchor="middle"
          letter-spacing="0.3">bropines</text>

    <!-- "PYTHON SLOPPER" -->
    <text x="58" y="23"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="5.5"
          font-weight="bold"
          fill="#00f0ff"
          text-anchor="middle"
          letter-spacing="0.3"
          opacity="0.9">PYTHON SLOPPER</text>

    <!-- Subtle Cyan Bottom Glow on Right Side -->
    <line x1="27" y1="30" x2="87" y2="30" stroke="#00f0ff" stroke-width="1" opacity="0.6" />

    <!-- Classic Retro 3D Bevel/Border Overlay -->
    <rect x="0.5" y="0.5" width="87" height="30" fill="none" stroke="#ffffff" stroke-opacity="0.1" />
</svg>