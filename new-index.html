<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Flexbox Layout</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #0a4a6e url(frutiger_aero.webp) center/cover fixed;
            background-size: 100vw;
            backdrop-filter: blur(1ex);
        }

        .main-c {
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            padding: 1rem;
            gap: 1rem;
        }

        .side-img {
            width: 30vw;
            background-image: url(logo.svg);
            background-size: auto 75%;
            background-repeat: no-repeat;
            background-position: center;
        }

        .right-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .navbar {
            border-radius: 1rem; /* Pill shape */

            /* The "Gel" Gradient: Sharp transition at 50% creates the plastic look */
            background: linear-gradient(to bottom,rgba(117,117,117,.7) 0,rgba(255,255,255,.1) 100%); /* Vibrant Base Color */

            /* Shadows */
            box-shadow:
                    0 4px 10px rgba(0, 0, 0, 0.2),
                    inset 0 1px 0 rgba(255, 255, 255, 0.5);
            height: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }

        .navbar a {
            color: #ffffff;
            text-decoration: underline;
            font-size: 2vh;
            font-weight: bold;
        }

        .content-m {
            border-radius: 1rem;
            background-color: #707376ba;
            color: #ffffff;
            flex: 1;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            text-align: left;
            padding: 1rem;
        }

        @media (max-width: 600px) {
            .main-c {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }

            .side-img {
                width: 100%;
                height: 15vh;
            }

            .content-m {
                min-height: 300px;
            }
        }
    </style>
    <script>
        const birth = new Date(1031515200000);
        const f = Math.floor
        setInterval(() => {
            const now = new Date();
            const s = f((now - birth) / 1000);
            const d = f(s / 86400);
            const h = f((s % 86400) / 3600);
            const m = f((s % 3600) / 60);
            const sec = s % 60;
            const y = f(d / 365.25);
            document.getElementById('my-uptime').innerText =
                `My uptime:\t${d}d, ${h}h, ${m}m, ${sec}s (${y}y ♍)`;
        }, 1000);
    </script>
</head>
