<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taruu site</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #0a4a6e url(frutiger_aero.webp) no-repeat;
            background-size: cover;
            backdrop-filter: blur(1ex);
            text-shadow: 5px 5px 5px #003C7899, 0 0 1rem #96E6FF66, #57575794 1px 1px 0;
            text-decoration-color: #003d70;

            font-size: 120%;
        }

        .head-c {
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            padding: 1rem;
            gap: 1rem;
        }

        .boxsh {
            box-shadow: 0 6px 24px #32B4FF59, 0 0 40px #64FFC81A, inset 0 2px 3px #FFFFFFD9;
            background: linear-gradient(180deg, #FFFFFF80 0%, #B4F0FF59 50%, #78DCFF66 100%);
            backdrop-filter: blur(20px) saturate(180%);
        }

        .side-img {
            width: 30vw;
            background: url(logo.svg) center/75% no-repeat, linear-gradient(180deg, #FFFFFF80 0%, #B4F0FF59 50%, #78DCFF66 100%);
            border: 2px solid #FFFFFF99;
            border-radius: 1rem;

            position: relative;
            overflow: hidden
        }

        .main-c {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .navbar {
            border: 2px solid #FFFFFFA6;
            border-radius: 14px;
            padding: 10px;
            display: flex;
            gap: 6px;
            position: relative;
            overflow: clip;
            flex-wrap: wrap;
            justify-content: center;
        }

        .navbar a {

            flex: 1 1 45px;

            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;

            white-space: normal;
            word-wrap: break-word;


            position: relative;
            background: linear-gradient(
                    135deg,
                    #FFFFFFCC 0%,
                    #DCF8FF99 50%,
                    #B4F0FFB2 100%
            );
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 1rem;
            padding: 1vw;
            font-size: 2ex;
            color: #003d70;

            font-weight: 700;


            box-shadow: 0 4px 15px rgba(80, 180, 255, 0.4),
            0 0 30px rgba(150, 255, 220, 0.2),
            inset 0 2px 4px rgba(255, 255, 255, 1),
            inset 0 -2px 4px rgba(50, 150, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9);
        }

        .navbar a:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 8px 25px #64C8FF99,
            0 0 50px #B4FFE659, inset 0 2px 4px #fff;
        }

        .content-m {
            border-radius: 1rem;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            text-align: left;
            padding: 2rem;
        }

        @media (max-width: 600px) {
            .head-c {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }

            .navbar {
                flex-direction: column;
            }

            .side-img {
                width: 100%;
                height: 15vh;
            }

            .content-m {
                min-height: 300px;
            }
        }
    </style>
    <script>
        const birth = new Date(1031515200000);
        const f = Math.floor
        setInterval(() => {
            const now = new Date();
            const s = f((now - birth) / 1000);
            const d = f(s / 86400);
            const h = f((s % 86400) / 3600);
            const m = f((s % 3600) / 60);
            const sec = s % 60;
            const y = f(d / 365.25);
            document.getElementById('my-uptime').innerText =
                `My uptime:\t${d}d, ${h}h, ${m}m, ${sec}s (${y}y ♍)`;
        }, 1000);
    </script>
</head>
