<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Flexbox Layout</title>
    <style>
        body {
            margin: 0;
            background-color: white;
            font-family: "Helvetian", serif;
        }

        .layout-container {
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            padding: 20px;
            gap: 20px;
        }

        .sidebar-orange {
            width: 30vw;
            background-image: url(assets/icons/logo.svg);
            background-size: auto 75%;
            background-repeat: no-repeat;
            background-position: center;
        }

        .right-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .navbar-red {
            background-color: #ff3333;
            height: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }

        .navbar-red a {
            color: #ffffff;
            text-decoration: underline;
            font-size: 1rem;
            font-weight: bold;
        }

        .content-black {
            background-color: #000000;
            color: #ffffff;
            flex: 1;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            text-align: left;
            padding: 1rem;
        }

        @media (max-width: 600px) {
            .layout-container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }

            .sidebar-orange {
                width: 100%;
                height: 15vh;
            }

            .content-black {
                min-height: 300px;
            }
        }
    </style>
    <script>
        const birth = new Date(1031515200000);
        setInterval(() => {
            const now = new Date();
            const s = Math.floor((now - birth) / 1000);
            const d = Math.floor(s / 86400);
            const h = Math.floor((s % 86400) / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            const y = Math.floor(d / 365.25);
            document.getElementById('my-uptime').innerText =
                `My uptime:\t${d}d, ${h}h, ${m}m, ${sec}s (${y}y ♍)`;
        }, 1000);
    </script>
</head>
