<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taruu site</title>
    <style>
        :root {
            /* Base Colors */
            --bg-b: #0a4a6e;
            --text-blue: #003d70;

            /* Translucent Whites (Glass Edges & Highlights) */
            --w-85: #ffffffd9;
            --w-80: #ffffffcc;
            --w-60: #ffffff99; /* Merged #FFFFFF99 and #FFFFFFA6 */
            --w-50: #ffffff80; /* Merged #FFFFFF80 and #FFFFFF7F */
            --w-40: #ffffff66; /* Converted rgba(255, 255, 255, 0.4) */

            /* Glassmorphism Gradients */
            --gbl: #b4f0ff59;
            --gbm: #b4f0ffb2;
            --gbd: #78dcff66;
            --gcl: #dcf8ff99;

            /* Text Shadows & Glows */
            --sbd: #003d7099; /* Merged #003C7899 to match --text-blue */
            --sg: #57575794;
            --gc: #96e6ff66;
            --bc: #00ccff66;

            /* Blue Box Shadows */
            --sb-20: #3296ff33;
            --sb-40: #32b4ff59; /* Consolidated #32B4FF59 and #50B4FF66 */
            --sb-60: #32b4ff99; /* Consolidated #64C8FF99 */

            /* Mint/Cyan Box Shadow Glows */
            --gm-10: #64ffc81a;
            --gm-20: #64ffc833; /* Consolidated #96FFDC33 */
            --gm-40: #64ffc866; /* Consolidated #B4FFE659 */
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: var(--bg-b) url(fa.webp) no-repeat;
            background-size: cover;
            backdrop-filter: blur(1ex);
            text-shadow: 5px 5px 5px var(--sbd), 0 0 1rem var(--gc), var(--sg) 1px 1px 0;
            text-decoration-color: var(--text-blue);

            font-size: 120%;
            min-height: 100vh;
        }

        .c-h {
            display: flex;
            box-sizing: border-box;
            padding: 1rem;
            gap: 1rem;
        }

        .c-v {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .boxsh {
            box-shadow: 0 6px 24px var(--sb-40), 0 0 40px var(--gm-10), inset 0 2px 3px var(--w-85);
            background: linear-gradient(180deg, var(--w-50) 0%, var(--gbl) 50%, var(--gbd) 100%);
            backdrop-filter: blur(20px) saturate(180%);
        }

        .s-img {
            background: url(logo.svg) center/75% no-repeat, linear-gradient(180deg, var(--w-50) 0%, var(--gbl) 50%, var(--gbd) 100%);
            border: 2px solid var(--w-60);
            min-width: 20vw;
            min-height: 50vh;
            border-radius: 1rem;
            height: fit-content;
            position: relative;
            overflow: hidden;
            padding: 1rem;
        }

        .navbar {
            border: 2px solid var(--w-60);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            gap: 6px;
            position: relative;
            overflow: clip;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .navbar a {
            flex: 1 1 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: normal;
            word-wrap: break-word;
            position: relative;
            background: linear-gradient(
                    135deg,
                    var(--w-80) 0%,
                    var(--gcl) 50%,
                    var(--gbm) 100%
            );
            border: 2px solid var(--w-80);
            border-radius: 1rem;
            padding: 1vw;
            font-size: 2ex;
            color: var(--text-blue);
            font-weight: 700;
            box-shadow: 0 4px 15px var(--sb-40),
            0 0 30px var(--gm-20),
            inset 0 2px 4px white,
            inset 0 -2px 4px var(--sb-20);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .navbar a:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 8px 25px var(--sb-60),
            0 0 50px var(--gm-40),
            inset 0 2px 4px white;
        }

        .content-m {
            border-radius: 1rem;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            text-align: left;
            padding: 2rem;
            width: fit-content;
        }

        @media (max-width: 600px) {
            .c-h {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }

            .navbar {
                flex-direction: column;
            }

            .s-img {
                min-height: 15vh;
            }

            .content-m {
                min-height: 300px;
            }
        }

        .aero-bg {
            position: fixed;
            inset: 0;
            z-index: -999;
            pointer-events: none;
            overflow: hidden;
            contain: strict;
        }

        .aero-bg i {
            position: absolute;
            bottom: -150px;
            border-radius: 50%;
            border: 1px solid var(--w-40);
            background: radial-gradient(circle at 70% 70%, var(--bc) 0, transparent 60%);
            filter: drop-shadow(0 0 8px var(--bc));
            animation: up linear infinite;
            will-change: auto;
        }

        .aero-bg i::after {
            content: '';
            position: absolute;
            top: 5%;
            left: 15%;
            width: 70%;
            height: 40%;
            border-radius: 50%;
            background: linear-gradient(var(--w-50), transparent);
        }

        @keyframes up {
            0% {
                transform: translate3d(0, 0, 0);
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: translate3d(0, -120vh, 0);
                opacity: 0;
            }
        }
    </style>
    <script>
        let s, d, h, m, sc, y, c, p, mr, f;
        p = (num) => num.toString().padStart(2, '0');
        f = Math.floor;
        mr = Math.random;
        setInterval(() => {
            s = f((new Date() - new Date(1031515200000)) / 1000);
            d = f(s / 86400);
            h = f((s % 86400) / 3600);
            m = f((s % 3600) / 60);
            sc = s % 60;
            y = f(d / 365.25);
            document.getElementById('my-uptime').innerText =
                `My uptime:\t${d}d, ${p(h)}h, ${p(m)}m, ${p(sc)}s (${y}y ♍)`;
        }, 1000);
        document.addEventListener("DOMContentLoaded", () => {
            h = "";
            for (let i = 0; i < 15 - (navigator.maxTouchPoints > 0 ? 10 : 0); i++) {
                c = Math.random() * 100 + 60;
                h += `<i style="left:${p(mr() * 100)}%;width:${p(c)}px;height:${p(c)}px;animation-duration:${p(mr() * 10 + 5)}s;animation-delay:${p(mr() * 8 + 1)}s"></i>`;
            }

            document.body.insertAdjacentHTML('beforeend', `<div class="aero-bg">${h}</div>`);
        });

    </script>
