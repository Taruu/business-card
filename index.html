    <style>
        :root {
            /* Base Colors */
            --bg-b: #0a4a6e;
            --text-blue: #003d70;

            /* Translucent Whites (Glass Edges & Highlights) */
            --w-85: #ffffffd9;
            --w-80: #ffffffcc;
            --w-60: #ffffff99;
            --w-50: #ffffff80;
            --w-40: #ffffff66;

            /* Glassmorphism Gradients */
            --gbl: #b4f0ff59;
            --gbm: #b4f0ffb2;
            --gbd: #78dcff66;
            --gcl: #dcf8ff99;

            /* Text Shadows & Glows */
            --sbd: #003d7099;
            --sg: #57575794;
            --gc: #96e6ff66;
            --bc: #00ccff66;

            /* Blue Box Shadows */
            --sb-20: #3296ff33;
            --sb-40: #32b4ff59;
            --sb-60: #32b4ff99;

            /* Mint/Cyan Box Shadow Glows */
            --gm-10: #64ffc81a;
            --gm-20: #64ffc833;
            --gm-40: #64ffc866;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background-color: var(--bg-b);
            color: #ffffff;
            text-decoration-color: var(--text-blue);
            font-size: 120%;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Hardware-accelerated background layer */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: var(--bg-b) url(fa.webp) no-repeat;
            background-size: cover;
            filter: blur(10px);
            z-index: -1000;
            transform: scale(1.05); /* Prevents white margins at edge of screen due to blur */
            pointer-events: none;
        }

        /* Targeted glowing text aesthetics to improve overall paint performance */
        .content-m, .navbar a, h1, h4, caption, td, li {
            text-shadow: 3px 3px 6px var(--sbd), 0 0 10px var(--gc), var(--sg) 1px 1px 0;
        }

        .c-h {
            display: flex;
            box-sizing: border-box;
            padding: 1rem;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .c-v {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .boxsh {
            box-shadow: 0 6px 24px var(--sb-40), 0 0 40px var(--gm-10), inset 0 2px 3px var(--w-85);
            background: linear-gradient(180deg, var(--w-50) 0%, var(--gbl) 50%, var(--gbd) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }

        .img-block-shadowed {
            background: url(logo.svg) center/75% no-repeat, linear-gradient(180deg, var(--w-50) 0%, var(--gbl) 50%, var(--gbd) 100%);
            border: 2px solid var(--w-60);
            min-width: 20vw;
            min-height: 50vh;
            border-radius: 1rem;
            height: fit-content;
            position: relative;
            overflow: hidden;
            padding: 1rem;
        }

        .navbar {
            border: 2px solid var(--w-60);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            gap: 6px;
            position: relative;
            overflow: clip;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .navbar a {
            flex: 1 1 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: normal;
            word-wrap: break-word;
            position: relative;
            background: linear-gradient(
                    135deg,
                    var(--w-80) 0%,
                    var(--gcl) 50%,
                    var(--gbm) 100%
            );
            border: 2px solid var(--w-80);
            border-radius: 1rem;
            padding: 1vw;
            font-size: 2ex;
            color: var(--text-blue);
            font-weight: 700;
            box-shadow: 0 4px 15px var(--sb-40),
            0 0 30px var(--gm-20),
            inset 0 2px 4px white,
            inset 0 -2px 4px var(--sb-20);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .navbar a:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 8px 25px var(--sb-60),
            0 0 50px var(--gm-40),
            inset 0 2px 4px white;
        }

        .content-m {
            border-radius: 1rem;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            text-align: left;
            padding: 2rem;
            width: fit-content;
        }

        @media (max-width: 600px) {
            .c-h {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }

            .navbar {
                flex-direction: column;
            }

            .img-block-shadowed {
                min-height: 15vh;
            }

            .content-m {
                min-height: 300px;
            }
        }

        .aero-bg {
            position: fixed;
            inset: 0;
            z-index: -999;
            pointer-events: none;
            overflow: hidden;
            contain: strict;
        }

        .aero-bg canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
    <script>
        // System Uptime Script
        let s, d, h, m, sc, y, p, f;
        p = (num) => num.toString().padStart(2, '0');
        f = Math.floor;

        setInterval(() => {
            s = f((new Date() - new Date(1031515200000)) / 1000);
            d = f(s / 86400);
            h = f((s % 86400) / 3600);
            m = f((s % 3600) / 60);
            sc = s % 60;
            y = f(d / 365.25);
            const el = document.getElementById('my-uptime');
            if (el) {
                el.innerText = `My uptime:\t${d}d, ${p(h)}h, ${p(m)}m, ${p(sc)}s (${y}y ♍)`;
            }
        }, 1000);

        // Interactive Audio Synthesizer Pop Sound Generator [20]
        let audioCtx;
        function playPopSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                // Fast pitch frequency ramp simulating a wet pop [20]
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.08);

                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            } catch (e) {
                console.warn("Audio Context blocked or unsupported by browser context");
            }
        }

        // Hardware-Accelerated Dynamic Bubble and Splat Engine
        addEventListener("DOMContentLoaded", () => {
            const d = document, b = d.body;
            const g = b.appendChild(d.createElement("div"));
            g.className = "aero-bg";
            const c = g.appendChild(d.createElement("canvas"));
            const x = c.getContext("2d");

            let bubbles = [];
            let particles = []; // Droplet splash arrays [20]
            const count = navigator.maxTouchPoints ? 8 : 16;

            // Dynamic Splat droplet particle class [20]
            class PopParticle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.vx = (Math.random() - 0.5) * 6;
                    this.vy = (Math.random() - 0.5) * 6 - 2;
                    this.radius = Math.random() * 3 + 1;
                    this.alpha = 1;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.15; // Simulated gravity pull [20]
                    this.alpha -= 0.035; // Fade-out factor [20]
                }
                draw() {
                    x.save();
                    x.globalAlpha = this.alpha;
                    x.fillStyle = 'rgba(255, 255, 255, 0.85)';
                    x.beginPath();
                    x.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    x.fill();
                    x.restore();
                }
            }

            class Bubble {
                constructor(spawnAtBottom = false) {
                    this.r = Math.random() * 40 + 20;
                    this.x = Math.random() * c.width;
                    this.y = spawnAtBottom ? c.height + this.r + Math.random() * 50 : Math.random() * c.height;
                    this.vy = -(Math.random() * 1.2 + 0.4);
                    this.wobble = Math.random() * 100;
                    this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                    this.wobbleRange = Math.random() * 0.8 + 0.2;
                }

                update() {
                    this.y += this.vy;
                    this.wobble += this.wobbleSpeed;
                    this.x += Math.sin(this.wobble) * this.wobbleRange;

                    // Reset position when bubble floats out of view [20]
                    if (this.y < -this.r) {
                        this.y = c.height + this.r + Math.random() * 20;
                        this.x = Math.random() * c.width;
                    }
                }

                draw() {
                    const bx = this.x, y = this.y, r = this.r;
                    x.save();

                    // Bubble Outer Rim/Glow
                    x.shadowColor = "#0cf6";
                    x.shadowBlur = 10;
                    x.beginPath();
                    x.arc(bx, y, r, 0, Math.PI * 2);
                    x.strokeStyle = "#fff6";
                    x.lineWidth = 1.5;
                    x.stroke();

                    // Radial Gradient Core [20]
                    const ox = bx + r * .4, oy = y + r * .4;
                    const rg = x.createRadialGradient(ox, oy, 0, ox, oy, r * 1.2);
                    rg.addColorStop(0, "#0cf6");
                    rg.addColorStop(.6, "#0cf0");
                    x.fillStyle = rg;
                    x.fill();

                    // Remove shadows before drawing the gloss highlight to maximize rendering speeds
                    x.shadowColor = "transparent";
                    x.shadowBlur = 0;

                    // Specular Linear highlight [20]
                    const lg = x.createLinearGradient(bx, y - .9 * r, bx, y - .1 * r);
                    lg.addColorStop(0, "#fff8");
                    lg.addColorStop(1, "#fff0");
                    x.beginPath();
                    x.ellipse(bx, y - .5 * r, .7 * r, .4 * r, 0, 0, Math.PI * 2);
                    x.fillStyle = lg;
                    x.fill();

                    x.restore();
                }
            }

            const resize = () => {
                c.width = window.innerWidth;
                c.height = window.innerHeight;
                if (bubbles.length === 0) {
                    for (let i = 0; i < count; i++) {
                        bubbles.push(new Bubble(false));
                    }
                }
            };

            const animate = () => {
                x.clearRect(0, 0, c.width, c.height);

                // Update and render bubbles [20]
                for (let i = 0; i < bubbles.length; i++) {
                    bubbles[i].update();
                    bubbles[i].draw();
                }

                // Update and render splash particles [20]
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update();
                    p.draw();
                    if (p.alpha <= 0) {
                        particles.splice(i, 1);
                    }
                }

                requestAnimationFrame(animate);
            };

            // Hit coordinates matching mechanics [20]
            const handlePopCheck = (clientX, clientY) => {
                for (let i = bubbles.length - 1; i >= 0; i--) {
                    const b = bubbles[i];
                    const distance = Math.hypot(b.x - clientX, b.y - clientY);
                    if (distance <= b.r) {
                        // Generate splashing burst particles [20]
                        for (let j = 0; j < 8; j++) {
                            particles.push(new PopParticle(b.x, b.y));
                        }
                        playPopSound(); // Play synthesized audio [20]
                        bubbles[i] = new Bubble(true); // Recycle popped bubble to bottom [20]
                        break; // Click only bursts one bubble
                    }
                }
            };

            // Capture clicks and touches securely on window viewport context [20]
            window.addEventListener('mousedown', (e) => {
                handlePopCheck(e.clientX, e.clientY);
            });
            window.addEventListener('touchstart', (e) => {
                if (e.touches.length > 0) {
                    handlePopCheck(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: true });

            window.addEventListener("resize", resize);
            resize();
            animate();
        });
    </script>
