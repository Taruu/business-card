<svg xmlns="http://www.w3.org/2000/svg" width="88" height="31" viewBox="0 0 88 31">
    <defs>
        <!-- Background Gradient (Vibrant sky blue to aquatic deep blue) -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00e5ff" />
            <stop offset="45%" stop-color="#0072ff" />
            <stop offset="100%" stop-color="#0052d4" />
        </linearGradient>

        <!-- Glassy Wave Curve Gradient (Green organic touch) -->
        <linearGradient id="green-wave" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00e676" stop-opacity="0.6" />
            <stop offset="100%" stop-color="#00b0ff" stop-opacity="0.1" />
        </linearGradient>

        <!-- Top Gloss Highlight Gradient -->
        <linearGradient id="gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65" />
            <stop offset="40%" stop-color="#ffffff" stop-opacity="0.25" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
        </linearGradient>

        <!-- Glass Border Gradient -->
        <linearGradient id="border-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15" />
        </linearGradient>

        <!-- Fox Orange Gloss Gradient -->
        <linearGradient id="fox-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffa133" />
            <stop offset="100%" stop-color="#ff5d00" />
        </linearGradient>

        <!-- Capsule Glass Pill Gradient -->
        <linearGradient id="pill-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
        </linearGradient>

        <!-- Clip path to restrict visible scrolling numbers inside the glassy pill capsule -->
        <clipPath id="num-clip">
            <rect x="34" y="16" width="14" height="11" />
        </clipPath>
    </defs>

    <style>
        /* Clean, modern, high-gloss typography */
        .aero-text {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.4);
        }
        .aero-sub {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        font-weight: 700;
        font-size: 6.5px;
        fill: #ffffff;
        text-shadow: 0px 1px 1px rgba(0, 0, 0, 0.3);
        }

        /* Alternates between "Taruu count" and "Fox Sleep" every 8 seconds */
        @keyframes phase1 {
        0%, 48% { opacity: 1; visibility: visible; }
        50%, 98% { opacity: 0; visibility: hidden; }
        100% { opacity: 1; visibility: visible; }
        }
        @keyframes phase2 {
        0%, 48% { opacity: 0; visibility: hidden; }
        50%, 98% { opacity: 1; visibility: visible; }
        100% { opacity: 0; visibility: hidden; }
        }
        .p1 { animation: phase1 8s infinite; }
        .p2 { animation: phase2 8s infinite; }

        /* Vertical scrolling numbers odometer effect */
        @keyframes slideCount {
        0%, 15% { transform: translateY(0px); }
        20%, 35% { transform: translateY(-10px); }
        40%, 55% { transform: translateY(-20px); }
        60%, 75% { transform: translateY(-30px); }
        80%, 100% { transform: translateY(-40px); }
        }
        .counter-strip { animation: slideCount 4s infinite ease-in-out; }

        /* Glassy dots glowing/pulsing */
        @keyframes glowDot1 { 0%, 20% { opacity: 0.3; } 40%, 100% { opacity: 1; } }
        @keyframes glowDot2 { 0%, 40% { opacity: 0.3; } 60%, 100% { opacity: 1; } }
        @keyframes glowDot3 { 0%, 60% { opacity: 0; } 80%, 100% { opacity: 1; } }
        .gd1 { animation: glowDot1 1.5s infinite; }
        .gd2 { animation: glowDot2 1.5s infinite; }
        .gd3 { animation: glowDot3 1.5s infinite; }

        /* Floating physical glassy water bubbles with Z's inside */
        @keyframes floatBubble1 {
        0% { transform: translate(24px, 18px) scale(0.6); opacity: 0; }
        30% { opacity: 0.9; }
        100% { transform: translate(27px, 2px) scale(1.1); opacity: 0; }
        }
        @keyframes floatBubble2 {
        0% { transform: translate(28px, 14px) scale(0.6); opacity: 0; }
        30% { opacity: 0.9; }
        100% { transform: translate(32px, -3px) scale(1.3); opacity: 0; }
        }
        .bubble1 { animation: floatBubble1 2.5s infinite ease-in-out; }
        .bubble2 { animation: floatBubble2 2.5s infinite ease-in-out 1.2s; }
    </style>

    <!-- Card Base with rounded corners -->
    <rect width="88" height="31" rx="4" ry="4" fill="url(#bg-grad)" />

    <!-- Organic Wave (Frutiger Aero green flare) -->
    <path d="M-10,31 Q 30,16 98,31 Z" fill="url(#green-wave)" />

    <!-- PHASE 1: "taruu" (Orange) + Counting inside a glassy capsule pill -->
    <g class="p1">
        <!-- Glowy Orange Taruu Title -->
        <text x="44" y="13" class="aero-text" font-size="10.5" fill="#ff9900" text-anchor="middle" letter-spacing="0.5">taruu</text>

        <!-- Glassy Capsule Pill background for counter -->
        <rect x="12" y="16" width="64" height="11" rx="5.5" ry="5.5" fill="url(#pill-grad)" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" />

        <!-- Count Label -->
        <text x="18" y="24.5" class="aero-sub">cnt:</text>

        <!-- Number Slot (clipped inside pill) -->
        <g clip-path="url(#num-clip)">
            <g class="counter-strip">
                <text x="35" y="24.5" class="aero-sub" fill="#00ffff">03</text>
                <text x="35" y="34.5" class="aero-sub" fill="#00e676">21</text>
                <text x="35" y="44.5" class="aero-sub" fill="#ffea00">58</text>
                <text x="35" y="54.5" class="aero-sub" fill="#ff3366">82</text>
                <text x="35" y="64.5" class="aero-sub" fill="#00ffff">99</text>
            </g>
        </g>

        <!-- Glass Bubble Dots (glowing/fading circles instead of text periods) -->
        <circle cx="53" cy="21.5" r="1.2" fill="#00e676" class="gd1" />
        <circle cx="58" cy="21.5" r="1.2" fill="#00e676" class="gd2" />
        <circle cx="63" cy="21.5" r="1.2" fill="#00e676" class="gd3" />
    </g>

    <!-- PHASE 2: Glossy Fox Face + "fox go to sleep" -->
    <g class="p2">
        <!-- Floating Glassy Z-Bubbles -->
        <g class="bubble1">
            <circle cx="0" cy="0" r="3" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="0.5" />
            <circle cx="-1" cy="-1" r="0.7" fill="#ffffff" />
            <text x="0" y="1.2" font-family="'Segoe UI', sans-serif" font-size="4" fill="#ffffff" font-weight="900" text-anchor="middle">z</text>
        </g>
        <g class="bubble2">
            <circle cx="0" cy="0" r="3.5" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="0.5" />
            <circle cx="-1" cy="-1" r="0.9" fill="#ffffff" />
            <text x="0" y="1.5" font-family="'Segoe UI', sans-serif" font-size="5.5" fill="#ffffff" font-weight="900" text-anchor="middle">Z</text>
        </g>

        <!-- Glossy Vector Sleeping Fox -->
        <g transform="translate(1, 1)">
            <!-- Smooth Rounded Ears -->
            <path d="M 4,14 Q 4,1 8,2 Q 11,2 11,10 Z" fill="url(#fox-grad)" />
            <path d="M 6,12 Q 6,4 8,4 Q 10,4 10,10 Z" fill="#ffb3b3" />
            <path d="M 22,14 Q 22,1 18,2 Q 15,2 15,10 Z" fill="url(#fox-grad)" />
            <path d="M 20,12 Q 20,4 18,4 Q 16,4 16,10 Z" fill="#ffb3b3" />

            <!-- Rounded Head Base -->
            <path d="M 4,11 C 4,7 22,7 22,11 C 22,16 13,23 13,23 C 13,23 4,16 4,11" fill="url(#fox-grad)" />

            <!-- Smooth Cheeks -->
            <path d="M 4,12 C 6,16 10,21 13,21 C 16,21 20,16 22,12 C 20,15 17,17 13,17 C 9,17 6,15 4,12" fill="#ffffff" />
            <circle cx="13" cy="19.5" r="1.2" fill="#111116" />

            <!-- Sleepy Eyes -->
            <path d="M 7,12 Q 9,14 11,12" fill="none" stroke="#223" stroke-width="1.2" stroke-linecap="round" />
            <path d="M 19,12 Q 17,14 15,12" fill="none" stroke="#223" stroke-width="1.2" stroke-linecap="round" />

            <!-- Forehead Gloss Reflection Specular -->
            <ellipse cx="13" cy="9.5" rx="3.5" ry="1.2" fill="#ffffff" opacity="0.55" />
        </g>

        <!-- Modern Glossy Orange Aero Text -->
        <text x="59" y="13.5" class="aero-text" font-size="8" fill="#ffa133" text-anchor="middle">fox go</text>
        <text x="59" y="22.5" class="aero-text" font-size="8" fill="#ffa133" text-anchor="middle">to sleep</text>
    </g>

    <!-- 3D Curved Glass Overlay reflection across upper half -->
    <path d="M 0,0 L 88,0 L 88,14 Q 44,19 0,14 Z" fill="url(#gloss-grad)" pointer-events="none" />

    <!-- Outer Glass Frame Highlight (Rounded edge bezel) -->
    <rect width="88" height="31" rx="4" ry="4" fill="none" stroke="url(#border-grad)" stroke-width="1" pointer-events="none" />
</svg>